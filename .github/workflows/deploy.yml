name: Deploy to Namecheap FTP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install lftp -y

      - name: Upload via FTP
        run: |
          lftp -e "
          set ftp:ssl-allow no;
          open -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }} ftp://${{ secrets.FTP_HOST }};
          mirror -R . /public_html --ignore-time --parallel=10;
          bye
          "
